<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Soldier Ops 3D - Optimized</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#ui { position:fixed; top:10px; left:10px; color:white; font-family:Arial; }
</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Kills: <span id="score">0</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
let scene, camera, renderer, clock;

let player = {
    velocity: new THREE.Vector3(),
    health: 100
};

let enemies = [];
let particles = [];

let keys = {};
let mouse = {x:0,y:0};

let gameRunning = true;
let lastSpawn = 0;
let kills = 0;

const SPEED = 10;
const ENEMY_SPEED = 4;
const MAX_ENEMIES = 8;

let lastFrameTime = 0;
const FPS_LIMIT = 60;

// ===== INIT =====
function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.y = 2;

    renderer = new THREE.WebGLRenderer({antialias:false});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // luz leve
    scene.add(new THREE.AmbientLight(0xffffff,0.7));

    // chão
    let ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200,200),
        new THREE.MeshBasicMaterial({color:0x111111})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // eventos
    addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
    addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);
    addEventListener("mousemove", e=>{
        if(document.pointerLockElement){
            mouse.x = e.movementX;
            mouse.y = e.movementY;
        }
    });
    renderer.domElement.onclick = ()=>renderer.domElement.requestPointerLock();

    animate();
}

// ===== PLAYER =====
function updatePlayer(delta){
    let dir = new THREE.Vector3();

    if(keys["w"]) dir.z -= 1;
    if(keys["s"]) dir.z += 1;
    if(keys["a"]) dir.x -= 1;
    if(keys["d"]) dir.x += 1;

    if(dir.length()>0){
        dir.normalize().multiplyScalar(SPEED*delta*0.8);
        camera.position.add(dir);
    }

    camera.rotation.y -= mouse.x*0.002;
    camera.rotation.x -= mouse.y*0.002;
    camera.rotation.x = Math.max(-1.2, Math.min(1.2, camera.rotation.x));

    mouse.x=0;
    mouse.y=0;
}

// ===== ENEMY =====
function spawnEnemy(delta){
    lastSpawn += delta;

    if(lastSpawn > 2 && enemies.length < MAX_ENEMIES){
        let geo = new THREE.BoxGeometry(2,2,2);
        let mat = new THREE.MeshBasicMaterial({color:0xff0055});
        let e = new THREE.Mesh(geo,mat);

        e.position.set(
            (Math.random()-0.5)*50,
            1,
            (Math.random()-0.5)*50
        );

        scene.add(e);
        enemies.push(e);
        lastSpawn = 0;
    }
}

function updateEnemies(delta){
    enemies.forEach(e=>{
        let dir = new THREE.Vector3().subVectors(camera.position, e.position);
        let dist = dir.length();

        dir.normalize();
        e.position.add(dir.multiplyScalar(ENEMY_SPEED*delta));

        if(dist < 2){
            player.health -= 10;
            document.getElementById("hp").innerText = player.health;

            if(player.health <= 0){
                alert("Game Over\nKills: "+kills);
                location.reload();
            }
        }
    });
}

// ===== TIRO =====
addEventListener("click", ()=>{
    if(!document.pointerLockElement) return;

    let ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);

    let hit = ray.intersectObjects(enemies.slice(0,5));

    if(hit.length>0){
        let enemy = hit[0].object;

        scene.remove(enemy);
        enemies = enemies.filter(e=>e!==enemy);

        kills++;
        document.getElementById("score").innerText = kills;

        explosion(enemy.position);
    }
});

// ===== PARTÍCULAS =====
function explosion(pos){
    for(let i=0;i<6;i++){
        let p = new THREE.Mesh(
            new THREE.BoxGeometry(0.3,0.3,0.3),
            new THREE.MeshBasicMaterial({color:0xff0055})
        );

        p.position.copy(pos);
        p.vel = new THREE.Vector3(
            (Math.random()-0.5)*5,
            (Math.random()-0.5)*5,
            (Math.random()-0.5)*5
        );

        p.life = 1;

        scene.add(p);
        particles.push(p);
    }
}

function updateParticles(delta){
    for(let i=particles.length-1;i>=0;i--){
        let p = particles[i];

        p.position.add(p.vel.clone().multiplyScalar(delta));
        p.life -= delta;

        if(p.life<=0){
            scene.remove(p);
            particles.splice(i,1);
        }
    }
}

// ===== LOOP =====
function animate(time=0){
    if(!gameRunning) return;

    requestAnimationFrame(animate);

    if(time - lastFrameTime < 1000/FPS_LIMIT) return;
    lastFrameTime = time;

    let delta = Math.min(clock.getDelta(),0.05);

    updatePlayer(delta);
    spawnEnemy(delta);
    updateEnemies(delta);
    updateParticles(delta);

    renderer.render(scene,camera);
}

init();
</script>

</body>
</html>
