<script>
let scene, camera, renderer, clock;

let player = {
    group: new THREE.Group(),
    velocity: new THREE.Vector3(),
    health: 100,
    isWalking: false
};

let gun, gunFlash;
let gameRunning = false, enemiesKilled = 0;

let keys = {}, mouse = { x: 0, y: 0 };
let enemies = [], walls = [], particles = [];

let lastSpawn = 0;
let walkTime = 0;

// 🔥 OTIMIZAÇÕES
const MAX_ENEMIES = 10;

const raycaster = new THREE.Raycaster();
const centerScreen = new THREE.Vector2(0, 0);

const tempVec1 = new THREE.Vector3();
const tempVec2 = new THREE.Vector3();
const tempVec3 = new THREE.Vector3();

const PLAYER_SPEED = 15;
const PLAYER_RADIUS = 1.5;
const ENEMY_SPEED = 6;

// Reuso de geometria/material
const enemyGeo = new THREE.OctahedronGeometry(2);
const enemyMat = new THREE.MeshStandardMaterial({
    color: 0xff0055,
    emissive: 0x880022,
    flatShading: true
});

const particleGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.FogExp2(0x020205, 0.015);

    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

    renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    document.body.appendChild(renderer.domElement);

    setupLighting();
    createEnvironment();
    setupPlayer();

    window.addEventListener('resize', onWindowResize);
    document.addEventListener('mousemove', onMouseMove);
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    renderer.domElement.addEventListener('mousedown', shoot);
}

function setupLighting() {
    scene.add(new THREE.AmbientLight(0x202040, 0.6));

    const dirLight = new THREE.DirectionalLight(0x00f3ff, 0.8);
    dirLight.position.set(50, 100, 50);

    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(512, 512);

    scene.add(dirLight);
}

function createEnvironment() {
    const gridHelper = new THREE.GridHelper(200, 100, 0x00f3ff, 0x002244);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshStandardMaterial({ color: 0x050510 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
}

function setupPlayer() {
    scene.add(player.group);
    player.group.position.set(0, 4, 0);

    gun = new THREE.Group();

    const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 2), new THREE.MeshStandardMaterial());
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 1.5), new THREE.MeshStandardMaterial());
    body.position.z = 0.5;

    gunFlash = new THREE.PointLight(0x00f3ff, 0, 15);
    gunFlash.position.set(0, 0, -1.5);

    gun.add(barrel, body, gunFlash);

    gun.position.set(1, -0.8, -1.5);
    camera.add(gun);
    player.group.add(camera);
}

function checkCollision(pos) {
    const playerBox = new THREE.Box3().setFromCenterAndSize(
        pos,
        new THREE.Vector3(PLAYER_RADIUS, 5, PLAYER_RADIUS)
    );

    for (let wall of walls) {
        if (playerBox.intersectsBox(wall)) return true;
    }
    return false;
}

function createExplosion(pos, color) {
    const pMat = new THREE.MeshBasicMaterial({ color });

    for (let i = 0; i < 10; i++) {
        const p = new THREE.Mesh(particleGeo, pMat);

        p.position.copy(pos);
        p.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10
        );

        p.life = 1;
        scene.add(p);
        particles.push(p);
    }
}

function shoot() {
    if (!gameRunning || document.pointerLockElement !== renderer.domElement) return;

    gun.position.z = -1.0;
    gunFlash.intensity = 5;

    raycaster.setFromCamera(centerScreen, camera);
    const intersects = raycaster.intersectObjects(enemies, false);

    if (intersects.length > 0) {
        const target = intersects[0].object;

        createExplosion(target.position, 0xff0055);
        scene.remove(target);

        enemies.splice(enemies.indexOf(target), 1);

        enemiesKilled++;
        document.getElementById('score-display').innerText = enemiesKilled;
    }
}

function spawnEnemy(delta) {
    if (enemies.length >= MAX_ENEMIES) return;

    lastSpawn += delta;

    const spawnRate = Math.max(0.8, 2.5 - enemiesKilled * 0.05);

    if (lastSpawn > spawnRate) {
        const enemy = new THREE.Mesh(enemyGeo, enemyMat);

        let angle = Math.random() * Math.PI * 2;

        enemy.position.set(
            player.group.position.x + Math.cos(angle) * 60,
            4,
            player.group.position.z + Math.sin(angle) * 60
        );

        enemy.castShadow = false;

        scene.add(enemy);
        enemies.push(enemy);

        lastSpawn = 0;
    }
}

function takeDamage() {
    player.health -= 20;
    document.getElementById('hp-fill').style.width = Math.max(0, player.health) + "%";

    if (player.health <= 0) {
        gameRunning = false;
        alert("Game Over");
        location.reload();
    }
}

function startGame() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';

    renderer.domElement.requestPointerLock();

    gameRunning = true;
    clock.start();

    animate();
}

function animate() {
    if (!gameRunning) return;

    requestAnimationFrame(animate);

    const delta = Math.min(clock.getDelta(), 0.1);

    tempVec1.set(0, 0, -1).applyQuaternion(player.group.quaternion);
    tempVec2.set(1, 0, 0).applyQuaternion(player.group.quaternion);

    player.velocity.set(0, 0, 0);

    if (keys['w']) player.velocity.add(tempVec1);
    if (keys['s']) player.velocity.sub(tempVec1);
    if (keys['a']) player.velocity.sub(tempVec2);
    if (keys['d']) player.velocity.add(tempVec2);

    if (player.velocity.lengthSq() > 0) {
        player.velocity.normalize().multiplyScalar(PLAYER_SPEED * delta);

        const nextPos = player.group.position.clone().add(player.velocity);

        if (!checkCollision(nextPos)) {
            player.group.position.copy(nextPos);
        }
    }

    player.group.rotation.y -= mouse.x * 0.002;
    camera.rotation.x -= mouse.y * 0.002;

    mouse.x = 0;
    mouse.y = 0;

    enemies.forEach(en => {
        tempVec3.subVectors(player.group.position, en.position);
        tempVec3.y = 0;

        const dist = tempVec3.length();

        if (dist > 0.1) {
            tempVec3.normalize();
            en.position.addScaledVector(tempVec3, ENEMY_SPEED * delta);
        }

        if (dist < 3) takeDamage();
    });

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.position.addScaledVector(p.velocity, delta);
        p.life -= delta;

        if (p.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }

    spawnEnemy(delta);
    renderer.render(scene, camera);
}

function onMouseMove(e) {
    if (document.pointerLockElement === renderer.domElement) {
        mouse.x = e.movementX;
        mouse.y = e.movementY;
    }
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

window.onload = init;
</script>
