<!-- CÓDIGO ORIGINAL COM OTIMIZAÇÕES LEVES -->

<script>
const MAX_ENEMIES = 8; // limite de inimigos

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);

    // FOG MAIS LEVE
    scene.fog = new THREE.FogExp2(0x020205, 0.01);

    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // REDUZ RESOLUÇÃO
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.3));

    // REMOVE SOMBRAS (GRANDE GANHO)
    renderer.shadowMap.enabled = false;

    document.body.appendChild(renderer.domElement);

    setupLighting();
    createEnvironment();
    setupPlayer();

    window.addEventListener('resize', onWindowResize);
    document.addEventListener('mousemove', onMouseMove);
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    renderer.domElement.addEventListener('mousedown', shoot);
}

// LUZ MAIS LEVE
function setupLighting() {
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(50, 50, 50);
    scene.add(dirLight);
}

// PARTÍCULAS MAIS LEVES
function createExplosion(pos, color) {
    const particleCount = 6;

    const pMat = new THREE.MeshBasicMaterial({ color: color });
    const pGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
    
    for(let i=0; i<particleCount; i++) {
        const p = new THREE.Mesh(pGeo, pMat);
        p.position.copy(pos);
        p.velocity = new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
        p.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

// TIRO OTIMIZADO
function shoot() {
    if (!gameRunning || document.pointerLockElement !== renderer.domElement) return;

    gun.position.z = -1.0;
    gunFlash.intensity = 5;
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

    // LIMITA CHECAGEM
    const intersects = raycaster.intersectObjects(enemies.slice(0,6));

    if (intersects.length > 0) {
        const target = intersects[0].object;
        createExplosion(target.position, 0xff0055);
        scene.remove(target);
        enemies = enemies.filter(e => e !== target);
        enemiesKilled++;
        document.getElementById('score-display').innerText = enemiesKilled;
    }
}

// SPAWN MAIS LEVE
function spawnEnemy(delta) {
    lastSpawn += delta;

    const spawnRate = Math.max(0.8, 2.5 - (enemiesKilled * 0.05)); 
    
    if (lastSpawn > spawnRate && enemies.length < MAX_ENEMIES) {

        // GEOMETRIA MAIS LEVE
        const enemyGeo = new THREE.BoxGeometry(2,2,2);

        const enemyMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0055
        });

        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
        
        let angle = Math.random() * Math.PI * 2;
        let validSpawn = false;
        
        while(!validSpawn) {
            enemy.position.set(
                player.group.position.x + Math.cos(angle) * 60,
                4,
                player.group.position.z + Math.sin(angle) * 60
            );
            if(!checkCollision(enemy.position)) validSpawn = true;
            angle += 0.5;
        }

        // ❌ REMOVIDO: luz do inimigo

        scene.add(enemy);
        enemies.push(enemy);
        lastSpawn = 0;
    }
}

// INIMIGOS OTIMIZADOS
function updateEnemies(delta){
    enemies.forEach(en => {

        en.rotation.y += delta;

        // REMOVE ANIMAÇÃO PESADA
        en.position.y = 4;

        const moveDir = new THREE.Vector3().subVectors(player.group.position, en.position);
        moveDir.y = 0;
        const dist = moveDir.length();
        
        if(dist > 0.1) {
            moveDir.normalize();
            const nextEPos = en.position.clone().add(moveDir.multiplyScalar(ENEMY_SPEED * delta));
            if(!checkCollision(nextEPos)) {
                en.position.copy(nextEPos);
            }
        }

        if(dist < 3 && !en.isOnCooldown) {
            takeDamage();
            en.isOnCooldown = true;
            en.position.sub(moveDir.multiplyScalar(4)); 
            setTimeout(() => en.isOnCooldown = false, 1000);
        }
    });
}
</script>
