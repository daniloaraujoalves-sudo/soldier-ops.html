<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Soldier Ops 3D Optimized</title>

<style>
body { margin:0; overflow:hidden; background:#050505; }
#game-ui { position:fixed; top:10px; left:10px; color:white; font-family:Arial; }
</style>
</head>

<body>

<div id="game-ui">
HP: <span id="hp">100</span><br>
KILLS: <span id="score">0</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ===== VARIÁVEIS =====
let scene, camera, renderer, clock;

let player = {
    velocity: new THREE.Vector3(),
    health: 100
};

let enemies = [];
let particles = [];

let keys = {};
let mouse = {x:0,y:0};

let kills = 0;
let lastSpawn = 0;

const PLAYER_SPEED = 15;
const ENEMY_SPEED = 6;
const MAX_ENEMIES = 8;

// ===== INIT =====
function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);

    // fog mais leve
    scene.fog = new THREE.FogExp2(0x020205, 0.01);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.y = 4;

    renderer = new THREE.WebGLRenderer({ antialias:false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.3));
    renderer.shadowMap.enabled = false; // REMOVE SOMBRA

    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    setupLighting();
    createEnvironment();

    // eventos
    addEventListener("keydown", e=>keys[e.key.toLowerCase()] = true);
    addEventListener("keyup", e=>keys[e.key.toLowerCase()] = false);

    addEventListener("mousemove", e=>{
        if(document.pointerLockElement){
            mouse.x = e.movementX;
            mouse.y = e.movementY;
        }
    });

    renderer.domElement.onclick = ()=>{
        renderer.domElement.requestPointerLock();
    };

    animate();
}

// ===== LUZ OTIMIZADA =====
function setupLighting(){
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(50,50,50);
    scene.add(light);
}

// ===== MAPA =====
function createEnvironment(){
    const grid = new THREE.GridHelper(200, 100, 0x00f3ff, 0x002244);
    scene.add(grid);

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200,200),
        new THREE.MeshBasicMaterial({color:0x050510})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);
}

// ===== PLAYER =====
function updatePlayer(delta){
    const dir = new THREE.Vector3();
    const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

    if(keys["w"]) dir.add(forward);
    if(keys["s"]) dir.sub(forward);
    if(keys["a"]) dir.sub(side);
    if(keys["d"]) dir.add(side);

    if(dir.length()>0){
        dir.normalize().multiplyScalar(PLAYER_SPEED * delta * 0.8);
        camera.position.add(dir);
    }

    camera.rotation.y -= mouse.x * 0.002;
    camera.rotation.x -= mouse.y * 0.002;

    camera.rotation.x = Math.max(-1.2, Math.min(1.2, camera.rotation.x));

    mouse.x = 0;
    mouse.y = 0;
}

// ===== INIMIGOS =====
function spawnEnemy(delta){
    lastSpawn += delta;

    const spawnRate = 2;

    if(lastSpawn > spawnRate && enemies.length < MAX_ENEMIES){
        const enemy = new THREE.Mesh(
            new THREE.BoxGeometry(2,2,2), // MAIS LEVE
            new THREE.MeshBasicMaterial({color:0xff0055})
        );

        enemy.position.set(
            (Math.random()-0.5)*60,
            4,
            (Math.random()-0.5)*60
        );

        scene.add(enemy);
        enemies.push(enemy);
        lastSpawn = 0;
    }
}

function updateEnemies(delta){
    enemies.forEach(en=>{
        const dir = new THREE.Vector3().subVectors(camera.position, en.position);
        const dist = dir.length();

        dir.normalize();
        en.position.add(dir.multiplyScalar(ENEMY_SPEED * delta));

        en.position.y = 4; // remove animação pesada

        if(dist < 3){
            player.health -= 20;
            document.getElementById("hp").innerText = player.health;

            if(player.health <= 0){
                alert("Game Over\nKills: "+kills);
                location.reload();
            }
        }
    });
}

// ===== TIRO =====
addEventListener("click", ()=>{
    if(!document.pointerLockElement) return;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

    const hits = raycaster.intersectObjects(enemies.slice(0,6)); // OTIMIZADO

    if(hits.length > 0){
        const enemy = hits[0].object;

        scene.remove(enemy);
        enemies = enemies.filter(e=>e!==enemy);

        kills++;
        document.getElementById("score").innerText = kills;

        createExplosion(enemy.position);
    }
});

// ===== PARTÍCULAS =====
function createExplosion(pos){
    for(let i=0;i<6;i++){ // REDUZIDO
        const p = new THREE.Mesh(
            new THREE.BoxGeometry(0.3,0.3,0.3),
            new THREE.MeshBasicMaterial({color:0xff0055})
        );

        p.position.copy(pos);
        p.vel = new THREE.Vector3(
            (Math.random()-0.5)*10,
            (Math.random()-0.5)*10,
            (Math.random()-0.5)*10
        );

        p.life = 1;

        scene.add(p);
        particles.push(p);
    }
}

function updateParticles(delta){
    for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];

        p.position.add(p.vel.clone().multiplyScalar(delta));
        p.life -= delta;

        if(p.life <= 0){
            scene.remove(p);
            particles.splice(i,1);
        }
    }
}

// ===== LOOP =====
function animate(){
    requestAnimationFrame(animate);

    const delta = Math.min(clock.getDelta(), 0.05);

    updatePlayer(delta);
    spawnEnemy(delta);
    updateEnemies(delta);
    updateParticles(delta);

    renderer.render(scene, camera);
}

init();
</script>

</body>
</html>
