<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Soldier Ops 3D - Ultimate Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .menu-box {
            background: rgba(20, 20, 35, 0.95); 
            padding: 40px; border-radius: 15px;
            border: 2px solid #00aaff; text-align: center; color: white; width: 350px;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.2);
        }
        input { 
            width: 100%; padding: 15px; margin: 15px 0; 
            background: rgba(0,0,0,0.5); border: 1px solid #00aaff; 
            color: #fff; border-radius: 5px; font-size: 16px; outline: none;
        }
        button { 
            width: 100%; padding: 15px; 
            background: #00aaff; border: none; color: white; 
            font-weight: bold; cursor: pointer; border-radius: 5px;
            transition: 0.3s; margin-bottom: 10px;
        }
        button:hover { background: #0088cc; transform: scale(1.02); }
        
        #game-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(0,0,0,0.6); padding: 20px; border-radius: 5px; 
            border-left: 5px solid #00aaff;
        }
        .stat-label { font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        .stat-value { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        #hp-bar-container { width: 200px; height: 10px; background: #333; margin-top: 5px; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff4444; transition: 0.2s; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 25px; height: 25px; 
            border: 2px solid rgba(0, 255, 0, 0.5); border-radius: 50%; 
            transform: translate(-50%, -50%);
        }
        #damage-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0); pointer-events: none; z-index: 999;
            transition: background 0.1s;
        }
    </style>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="login-screen" class="overlay">
        <div class="menu-box">
            <h1 style="letter-spacing: 2px;">SOLDIER OPS</h1>
            <p style="font-size: 12px; color: #00aaff;">ULTIMATE EDITION</p>
            <input type="text" id="username" placeholder="Codinome do Agente" maxlength="12">
            <button onclick="startGame()">INICIAR MISSÃO</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="hud">
            <div class="stat-label">Agente</div>
            <div id="display-name" class="stat-value">---</div>
            <div class="stat-label">Integridade</div>
            <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
            <div style="margin-top:15px;" class="stat-label">Abates Confirmados</div>
            <div id="score-display" class="stat-value">0</div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let gameRunning = false, enemiesKilled = 0, health = 100;
        let keys = {}, mouse = { x: 0, y: 0 };
        let enemies = [], obstacles = [];
        let lastSpawn = 0, username = '';

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 30, 180);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Iluminação
            scene.add(new THREE.AmbientLight(0x404040, 0.5));
            const mainLight = new THREE.PointLight(0x00aaff, 1, 200);
            mainLight.position.set(0, 50, 0);
            scene.add(mainLight);

            // Chão Militar
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(1000, 100, 0x00aaff, 0x222222);
            scene.add(grid);

            createMilitaryMap();

            // Setup Player
            player = new THREE.Group();
            scene.add(player);

            // Eventos
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            renderer.domElement.addEventListener('mousedown', shoot);

            renderer.render(scene, camera);
        }

        function createMilitaryMap() {
            const colors = [0x222222, 0x333333, 0x1a1a1a];
            for (let i = 0; i < 60; i++) {
                const h = 4 + Math.random() * 12;
                const w = 6 + Math.random() * 10;
                const d = 6 + Math.random() * 10;
                
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, d),
                    new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random() * colors.length)] })
                );
                
                const x = (Math.random() - 0.5) * 350;
                const z = (Math.random() - 0.5) * 350;
                
                if (Math.abs(x) < 25 && Math.abs(z) < 25) continue;
                
                box.position.set(x, h/2, z);
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
                obstacles.push(box);
            }

            // Luzes de Alerta Vermelhas
            for(let i=0; i<8; i++) {
                const alertLight = new THREE.PointLight(0xff0000, 2, 60);
                alertLight.position.set((Math.random()-0.5)*300, 15, (Math.random()-0.5)*300);
                scene.add(alertLight);
            }
        }

        function startGame() {
            username = document.getElementById('username').value.trim() || "Recruta";
            document.getElementById('display-name').textContent = username;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            renderer.domElement.requestPointerLock();
            gameRunning = true;
            animate();
        }

        function takeDamage(amt) {
            health -= amt;
            document.getElementById('hp-bar-fill').style.width = health + "%";
            
            const flash = document.getElementById('damage-flash');
            flash.style.background = "rgba(255, 0, 0, 0.3)";
            setTimeout(() => flash.style.background = "rgba(255, 0, 0, 0)", 100);

            if (health <= 0) gameOver();
        }

        function shoot() {
            if (!gameRunning || document.pointerLockElement !== renderer.domElement) return;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                scene.remove(target);
                enemies = enemies.filter(e => e !== target);
                enemiesKilled++;
                document.getElementById('score-display').textContent = enemiesKilled;
            }
        }

        function spawnEnemy(delta) {
            lastSpawn += delta;
            if (lastSpawn > 1.5) {
                const enemy = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 6, 3),
                    new THREE.MeshLambertMaterial({ color: 0xff3333 })
                );
                const angle = Math.random() * Math.PI * 2;
                const dist = 80;
                enemy.position.set(
                    player.position.x + Math.cos(angle) * dist,
                    3,
                    player.position.z + Math.sin(angle) * dist
                );
                scene.add(enemy);
                enemies.push(enemy);
                lastSpawn = 0;
            }
        }

        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Movimento
            const speed = 0.6;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            const side = new THREE.Vector3(1, 0, 0).applyQuaternion(player.quaternion);

            if (keys['w']) player.position.add(dir.multiplyScalar(speed));
            if (keys['s']) player.position.add(dir.multiplyScalar(-speed));
            if (keys['a']) player.position.add(side.multiplyScalar(-speed));
            if (keys['d']) player.position.add(side.multiplyScalar(speed));

            // Mouse Look
            player.rotation.y -= mouse.x * 0.002;
            camera.rotation.x -= mouse.y * 0.002;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            mouse.x = 0; mouse.y = 0;

            camera.position.copy(player.position);
            camera.position.y += 4;
            camera.quaternion.copy(player.quaternion);

            // IA dos Inimigos
            enemies.forEach(en => {
                const toPlayer = new THREE.Vector3().subVectors(player.position, en.position).normalize();
                en.position.x += toPlayer.x * 0.3;
                en.position.z += toPlayer.z * 0.3;
                
                if(en.position.distanceTo(player.position) < 4) {
                    takeDamage(0.5);
                }
            });

            spawnEnemy(delta);
            renderer.render(scene, camera);
        }

        function gameOver() {
            gameRunning = false;
            document.exitPointerLock();
            alert(`MISSÃO FRACASSADA!\nAgente: ${username}\nAbates: ${enemiesKilled}`);
            location.reload();
        }

        function onMouseMove(e) {
            if (document.pointerLockElement === renderer.domElement) {
                mouse.x = e.movementX;
                mouse.y = e.movementY;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
