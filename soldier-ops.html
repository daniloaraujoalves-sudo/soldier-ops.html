<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Soldier Ops 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background: #000; 
            font-family: 'Arial', sans-serif; 
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .menu-box {
            background: rgba(20, 20, 35, 0.95); 
            padding: 40px; 
            border-radius: 15px;
            border: 2px solid #00aaff; 
            text-align: center; 
            color: white; 
            width: 320px;
            backdrop-filter: blur(10px);
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 15px 0; 
            background: rgba(10,10,20,0.8); 
            border: 2px solid #333; 
            color: #fff; 
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus { border-color: #00aaff; outline: none; }
        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(45deg, #00aaff, #0088cc); 
            border: none; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 10px 0;
            border-radius: 8px;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,170,255,0.4); }
        button.secondary { background: #444; }
        button.secondary:hover { background: #666; box-shadow: 0 5px 15px rgba(100,100,100,0.4); }
        
        #game-ui { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 100;
        }
        #info { 
            position: absolute; top: 20px; left: 20px; 
            color: white; 
            background: rgba(0,0,0,0.7); 
            padding: 15px 20px; 
            border-radius: 10px; 
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        #score-display { 
            position: absolute; top: 20px; right: 20px; 
            color: #00aaff; 
            font-size: 28px; 
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        #minimap { 
            position: absolute; top: 20px; right: 20px; 
            width: 180px; height: 180px; 
            border: 3px solid #00aaff; 
            background: rgba(0,0,0,0.8); 
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,170,255,0.5);
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 24px; height: 24px; 
            border: 2px solid #00aaff; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            opacity: 0.7;
            box-shadow: 0 0 10px #00aaff;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: #00aaff;
            width: 2px; height: 100%;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
        }
        #crosshair::after { transform: translate(-50%, -50%) rotate(0deg); }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="overlay">
        <div class="menu-box">
            <h1 style="margin-bottom: 20px; color: #00aaff; font-size: 28px;">🎖️ SOLDIER OPS 3D</h1>
            <input type="text" id="username" placeholder="Nome do Agente" maxlength="12">
            <button onclick="startGame()">🚀 INICIAR MISSÃO</button>
            <button class="secondary" onclick="showRank()">🏆 RANKING</button>
        </div>
    </div>

    <!-- GAME UI -->
    <div id="game-ui" style="display: none;">
        <div id="info">
            <div>WASD: Mover | Mouse: Olhar</div>
            <div>Sobreviva o máximo possível!</div>
        </div>
        <div id="score-display">Tempo: 0s</div>
        <div id="minimap">
            <canvas id="mapCanvas" width="180" height="180"></canvas>
        </div>
        <div id="crosshair"></div>
    </div>

    <!-- RANK SCREEN -->
    <div id="rank-screen" class="overlay" style="display: none;">
        <div class="menu-box">
            <h1 style="color: #00aaff;">🏆 TOP AGENTES</h1>
            <div id="rank-list" style="text-align: left; margin: 25px 0; max-height: 300px; overflow-y: auto;"></div>
            <button onclick="hideRank()">← VOLTAR</button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // === GAME STATE ===
        let scene, camera, renderer, player, clock, mixer;
        let gameRunning = false, gameTime = 0;
        let keys = {}, mouse = { x: 0, y: 0 };
        let enemies = [];
        let lastSpawn = 0;
        let username = '';

        // === ENEMY SYSTEM ===
        function updateEnemies(scene, playerPos, delta, onCollision) {
            lastSpawn += delta;
            if (lastSpawn > 2.5 - Math.min(gameTime * 0.005, 0.8)) { // Inimigos mais rápidos com o tempo
                const geo = new THREE.BoxGeometry(3, 6, 3);
                const mat = new THREE.MeshLambertMaterial({ 
                    color: new THREE.Color().setHSL(0, 1, 0.5 + Math.random() * 0.3)
                });
                const enemy = new THREE.Mesh(geo, mat);
                
                // Spawn em círculo ao redor do player
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 60;
                enemy.position.set(
                    playerPos.x + Math.cos(angle) * distance,
                    3,
                    playerPos.z + Math.sin(angle) * distance
                );
                
                enemy.speed = 0.2 + Math.random() * 0.15;
                scene.add(enemy);
                enemies.push(enemy);
                lastSpawn = 0;
            }

            // Update inimigos
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const dir = new THREE.Vector3().subVectors(playerPos, en.position).normalize();
                en.position.x += dir.x * en.speed;
                en.position.z += dir.z * en.speed;
                en.rotation.y = Math.atan2(dir.x, dir.z);
                
                if (en.position.distanceTo(playerPos) < 4) {
                    onCollision();
                    return;
                }
            }
        }

        // === MINIMAP ===
        function drawMinimap() {
            const canvas = document.getElementById('mapCanvas');
            const ctx = canvas.getContext('2d');
            const scale = 0.8;
            
            ctx.fillStyle = 'rgba(0,20,40,0.9)';
            ctx.fillRect(0, 0, 180, 180);
            
            // Player (centro)
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.arc(90, 90, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Enemies
            enemies.forEach(en => {
                const x = 90 + (en.position.x - player.position.x) * scale;
                const z = 90 + (en.position.z - player.position.z) * scale;
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(x, z, 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // === 1. SETUP INICIAL ===
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 50, 200);
            
            clock = new THREE.Clock();

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x2a2a4a });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid
            const grid = new THREE.GridHelper(200, 20, 0x444444, 0x222244);
            scene.add(grid);

            // Player
            player = new THREE.Group();
            player.position.set(0, 0, 0);
            scene.add(player);

            // Load Soldier Model
            const loader = new THREE.GLTFLoader();
            loader.load(
                'https://threejs.org/examples/models/gltf/Soldier.glb',
                (gltf) => {
                    const soldier = gltf.scene;
                    soldier.scale.set(3, 3, 3);
                    soldier.position.y = -2;
                    player.add(soldier);
                    mixer = new THREE.AnimationMixer(soldier);
                    console.log("✅ Soldado carregado!");
                },
                undefined,
                (error) => {
                    console.warn("⚠️ Modelo não carregou, usando cubo");
                    const geo = new THREE.BoxGeometry(2, 4, 1);
                    const mat = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
                    const fallback = new THREE.Mesh(geo, mat);
                    fallback.position.y = -1;
                    player.add(fallback);
                }
            );

            // Events
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('click', () => {
                if (gameRunning) renderer.domElement.requestPointerLock();
            });
        }

        // === 2. GAME FUNCTIONS ===
        function startGame() {
            username = document.getElementById('username').value.trim();
            if (username.length < 2) {
                alert("💥 Digite seu nome (mínimo 2 caracteres)!");
                return;
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            gameRunning = true;
            gameTime = 0;
            enemies = [];
            animate();
            console.log(`🎮 Jogo iniciado por ${username}`);
        }

        function gameOver() {
            gameRunning = false;
            saveScore(username, Math.floor(gameTime));
            
            setTimeout(() => {
                alert(`💀 GAME OVER!\nSua pontuação: ${Math.floor(gameTime)}s\nPressione F5 para jogar novamente!`);
            }, 100);
        }

        // === 3. ANIMATION LOOP ===
        function animate() {
            if (!gameRunning) return;
            
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            gameTime += delta;

            // Player Movement
            const moveSpeed = 0.4;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(player.quaternion);

            if (keys['w']) player.position.add(forward.multiplyScalar(moveSpeed * delta * 60));
            if (keys['s']) player.position.add(forward.multiplyScalar(-moveSpeed * 0.7 * delta * 60));
            if (keys['a']) player.position.add(right.multiplyScalar(-moveSpeed * 0.7 * delta * 60));
            if (keys['d']) player.position.add(right.multiplyScalar(moveSpeed * 0.7 * delta * 60));

            // Mouse Look
            player.rotation.y -= mouse.x * 0.002;
            camera.rotation.x -= mouse.y * 0.002;
            camera.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/6, camera.rotation.x));
            mouse.x *= 0.8;
            mouse.y *= 0.8;

            // Camera Follow
            const idealOffset = new THREE.Vector3(0, 12, 20).applyQuaternion(player.quaternion);
            const idealPosition = player.position.clone().add(idealOffset);
            camera.position.lerp(idealPosition, 0.1);
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);

            // Update systems
            if (mixer) mixer.update(delta);
            updateEnemies(scene, player.position, delta, gameOver);
            document.getElementById('score-display').textContent = `Tempo: ${Math.floor(gameTime)}s`;

            renderer.render(scene, camera);
            drawMinimap();
        }

        // === EVENT HANDLERS ===
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            if (document.pointerLockElement === renderer.domElement) {
                mouse.x += event.movementX || 0;
                mouse.y += event.movementY || 0;
            }
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // === RANKING SYSTEM ===
        function saveScore(name, score) {
            let ranking = JSON.parse(localStorage.getItem('soldierOpsRank') || "[]");
            ranking.push({ name, score, date: new Date().toLocaleDateString() });
            ranking.sort((a, b) => b.score - a.score);
            localStorage.setItem('soldierOpsRank', JSON.stringify(ranking.slice(0, 10)));
        }

        function showRank() {
            const container = document.getElementById('rank-list');
            let ranking = JSON.parse(localStorage.getItem('soldierOpsRank') || "[]");
            container.innerHTML = ranking.map((r, i) => 
                `<div style="padding: 8px; border-bottom: 1px solid #333;">
                    <span style="color: ${i < 3 ? '#ffd700' : 'white'}">${i+1}.</span> 
                    ${r.name} - <strong>${r.score}s</strong><br>
                    <small style="color: #888;">${r.date}</small>
                </div>`
            ).join('') || '<p style="color: #888;">Nenhum recorde ainda!</p>';
            document.getElementById('rank-screen').style.display = 'flex';
        }

        function hideRank() {
            document.getElementById('rank-screen').style.display = 'none';
        }

        // === START ===
        init();
    </script>
</body>
</html>
